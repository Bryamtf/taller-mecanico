name: CI - Taller Mecánico AUTONORT

on:
  push:
    branches: [ main, development, feature/* ]
  pull_request:
    branches: [ main, development ]

env:
  NODE_VERSION: '18'

jobs:
  # JOB 1: Validación del Backend (Node.js)
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      
      - name: Instalar dependencias
        run: npm install
      
      - name: Verificar sintaxis de archivos JS
        run: |
          echo " Archivos encontrados:"
          ls -la
          echo ""
          echo " Verificando sintaxis..."
          if ls *.js 1> /dev/null 2>&1; then
            for file in *.js; do
              echo "  Validando: $file"
              node -c "$file" && echo "OK" || echo "Error en $file"
            done
          else
            echo "No se encontraron archivos .js en la raíz"
          fi
            
      - name: Info del proyecto
        run: |
          echo " Nombre: $(node -p "require('./package.json').name")"
          echo " Versión: $(node -p "require('./package.json').version")"
          echo " Dependencias: $(node -p "Object.keys(require('./package.json').dependencies).length")"

  # JOB 2: Build del Frontend (React + Vite)
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' 
      
      - name: Instalar dependencias
        run: npm install
      
      - name: Build de producción
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api
      
      - name: Verificar build exitoso
        run: |
          if [ -d "dist" ]; then
            echo "Build exitoso! Archivos generados:"
            ls -la dist/
            echo ""
            echo "Tamaño del build:"
            du -sh dist/
          else
            echo "No se encontró la carpeta dist"
            exit 1
          fi
      
      - name: Guardar artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist
          retention-days: 7

  # JOB 3: Validación de Docker
  validate-docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Verificar docker-compose.yml
        run: |
          echo " Validando sintaxis de docker-compose..."
          docker compose -f docker-compose.yml config
          if [ $? -eq 0 ]; then
            echo " docker-compose.yml es válido"
          else
            echo " docker-compose.yml tiene errores (se arreglarán después)"
          fi
        continue-on-error: true
      
      - name:  Verificar Dockerfiles
        run: |
          echo " Contenido de carpeta docker/:"
          ls -la docker/ || echo "  (carpeta docker no existe)"
          echo ""
          
          if [ -f "docker/Dockerfile.backend" ]; then
            echo "✅ Dockerfile.backend existe"
            head -5 docker/Dockerfile.backend
          else
            echo "⚠️ Dockerfile.backend no encontrado - pendiente de creación"
          fi
          
          if [ -f "docker/Dockerfile.frontend" ]; then
            echo "✅ Dockerfile.frontend existe"
            head -5 docker/Dockerfile.frontend
          else
            echo "⚠️ Dockerfile.frontend no encontrado - pendiente de creación"
          fi
      
      - name: Versión de Docker
        run: |
          docker --version
          docker compose version

  # JOB 4: Verificar estructura del proyecto
  check-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Verificar estructura del proyecto
        run: |
          echo "========================================="
          echo "ESTRUCTURA DEL PROYECTO"
          echo "========================================="
          echo ""
          echo "Raíz del proyecto:"
          ls -la
          echo ""
          echo "Backend:"
          ls -la backend/ | head -10
          echo ""
          echo "Frontend:"
          ls -la frontend/ | head -10
          echo ""
          echo "Docker:"
          ls -la docker/ 2>/dev/null || echo "  (carpeta docker no existe)"
          echo ""
          echo "Archivos importantes:"
          test -f "docker-compose.yml" && echo "  ✅ docker-compose.yml" || echo "  ❌ docker-compose.yml"
          test -f ".gitignore" && echo "  ✅ .gitignore" || echo "  ❌ .gitignore"
          test -f "README.md" && echo "  ✅ README.md" || echo "  ⚠️ README.md"
      
      - name: Verificar dependencias críticas
        run: |
          echo ""
          echo "Dependencias del backend:"
          cat backend/package.json | grep -E '"(express|mysql2|jsonwebtoken)"' || echo "  (verificar package.json)"
          
          echo ""
          echo "Dependencias del frontend:"
          cat frontend/package.json | grep -E '"(react|vite|axios)"' || echo "  (verificar package.json)"

  # JOB 5: REPORTE FINAL
  report:
    needs: [validate-backend, build-frontend, validate-docker, check-files]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generar reporte de CI
        run: |
          echo ""
          echo "========================================="
          echo " CI - TALLER MECÁNICO AUTONORT"
          echo "========================================="
          echo ""
          echo "RESULTADOS DE VALIDACIÓN:"
          echo "-----------------------------------------"
          echo " Backend (Node.js)     : ${{ needs.validate-backend.result }}"
          echo " Frontend (React)     : ${{ needs.build-frontend.result }}"
          echo " Docker               : ${{ needs.validate-docker.result }}"
          echo " Estructura           : ${{ needs.check-files.result }}"
          echo "-----------------------------------------"
          echo ""
          
          if [[ "${{ needs.validate-backend.result }}" == "success" && \
                "${{ needs.build-frontend.result }}" == "success" ]]; then
            echo "¡TODAS LAS VALIDACIONES PASARON!"
            echo ""
            echo "✅ El código está listo para mergear"
            echo "💡 Próximo paso: Agregar pruebas automatizadas al backend"
          else
            echo "⚠️ ALGUNAS VALIDACIONES FALLARON"
            echo ""
            echo "Revisar los logs específicos de cada job arriba"
            echo "Recomendaciones:"
            if [[ "${{ needs.validate-backend.result }}" != "success" ]]; then
              echo "   • Backend: Verificar que npm install funciona localmente"
            fi
            if [[ "${{ needs.build-frontend.result }}" != "success" ]]; then
              echo "   • Frontend: Ejecutar 'npm run build' localmente para probar"
            fi
            if [[ "${{ needs.validate-docker.result }}" != "success" ]]; then
              echo "   • Docker: Verificar que docker-compose.yml tiene sintaxis correcta"
            fi
          fi
          
          echo ""
          echo "========================================="
          echo "Tiempo de ejecución: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================="